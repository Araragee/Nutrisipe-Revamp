<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Nutrisipe</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #FF6B35;
    --orange-light: #FF8C42;
    --orange-glow: rgba(255,107,53,0.35);
    --orange-soft: rgba(255,107,53,0.12);
    --bg: oklch(98.5% 0.008 60);
    --bg2: oklch(96% 0.010 55);
    --surface: rgba(255,255,255,0.85);
    --glass: rgba(255,255,255,0.18);
    --glass-border: rgba(255,255,255,0.5);
    --text: oklch(18% 0.012 240);
    --text2: oklch(45% 0.010 240);
    --text3: oklch(65% 0.008 240);
    --radius-card: 24px;
    --radius-btn: 14px;
    --shadow-card: 0 4px 24px rgba(30,20,10,0.10), 0 1px 4px rgba(30,20,10,0.06);
    --shadow-modal: 0 24px 80px rgba(20,10,0,0.22), 0 4px 16px rgba(20,10,0,0.10);
    --transition: cubic-bezier(0.34,1.2,0.64,1);
  }

  .dark {
    --bg: oklch(11% 0.010 240);
    --bg2: oklch(17% 0.014 240);
    --surface: rgb(26, 24, 32);
    --surface-solid: rgb(26, 24, 32);
    --glass: rgba(26,24,32,0.92);
    --glass-border: rgba(255,255,255,0.10);
    --text: oklch(97% 0.004 60);
    --text2: oklch(75% 0.008 60);
    --text3: oklch(55% 0.006 60);
    --shadow-card: 0 4px 28px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.3);
    --shadow-modal: 0 32px 100px rgba(0,0,0,0.6), 0 4px 20px rgba(0,0,0,0.4);
  }

  html, body, #root { height: 100%; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); transition: background 0.4s, color 0.4s; overflow: hidden; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--orange-soft); border-radius: 999px; }

  /* Utilities */
  .mont { font-family: 'Montserrat', sans-serif; }
  .orange { color: var(--orange); }

  /* ---- LANDING PAGE ---- */
  .landing {
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  .landing-nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 24px 48px; position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  }
  .logo { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 22px; letter-spacing: -0.5px; }
  .logo span { color: var(--orange); }
  .landing-hero {
    flex: 1; display: grid; grid-template-columns: 1fr 1fr; height: 100vh;
  }
  .hero-left {
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 64px 0 80px; gap: 28px;
  }
  .hero-tag {
    display: inline-flex; align-items: center; gap: 8px;
    background: var(--orange-soft); color: var(--orange);
    font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 12px;
    letter-spacing: 1.2px; text-transform: uppercase;
    padding: 8px 16px; border-radius: 999px; width: fit-content;
  }
  .hero-h1 {
    font-family: 'Montserrat', sans-serif; font-weight: 900;
    font-size: clamp(36px, 3.5vw, 56px); line-height: 1.08; letter-spacing: -2px;
    color: var(--text);
  }
  .hero-h1 em { color: var(--orange); font-style: normal; }
  .hero-sub { font-size: 17px; color: var(--text2); line-height: 1.65; max-width: 420px; }
  .hero-btns { display: flex; gap: 14px; align-items: center; }
  .btn-primary {
    background: linear-gradient(135deg, var(--orange) 0%, var(--orange-light) 100%);
    color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 700;
    font-size: 15px; padding: 16px 32px; border-radius: var(--radius-btn);
    border: none; cursor: pointer; letter-spacing: 0.3px;
    box-shadow: 0 6px 24px var(--orange-glow);
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 32px var(--orange-glow); }
  .btn-secondary {
    background: transparent; color: var(--text); font-family: 'Montserrat', sans-serif;
    font-weight: 600; font-size: 15px; padding: 16px 24px;
    border: 1.5px solid oklch(80% 0.012 240); border-radius: var(--radius-btn);
    cursor: pointer; transition: border-color 0.18s, color 0.18s;
  }
  .btn-secondary:hover { border-color: var(--orange); color: var(--orange); }
  .hero-stats { display: flex; gap: 36px; }
  .stat-item { display: flex; flex-direction: column; }
  .stat-num { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 26px; color: var(--text); }
  .stat-lbl { font-size: 12px; color: var(--text3); margin-top: 2px; }

  .hero-right {
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, oklch(92% 0.04 60) 0%, oklch(88% 0.06 55) 100%);
  }
  .dark .hero-right { background: linear-gradient(135deg, oklch(18% 0.02 55) 0%, oklch(22% 0.03 55) 100%); }

  .hero-collage {
    position: absolute; inset: 0; display: grid;
    grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 12px; padding: 12px;
  }
  .hero-img {
    border-radius: 20px; overflow: hidden; position: relative;
  }
  .hero-img:nth-child(1) { grid-row: span 2; }
  .hero-img img { width: 100%; height: 100%; object-fit: cover; }

  /* ---- AUTH ---- */
  .auth-page {
    height: 100vh; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .auth-bg {
    position: absolute; inset: 0;
    background: linear-gradient(135deg, oklch(90% 0.05 60) 0%, oklch(85% 0.08 55) 50%, oklch(80% 0.12 55) 100%);
  }
  .dark .auth-bg {
    background: linear-gradient(135deg, oklch(14% 0.015 240) 0%, oklch(18% 0.02 55) 100%);
  }
  .auth-bg-img {
    position: absolute; inset: 0; opacity: 0.18;
    background-image: url('https://picsum.photos/1200/800?random=99');
    background-size: cover; background-position: center;
    filter: blur(2px);
  }
  .auth-card {
    position: relative; z-index: 2;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1.5px solid var(--glass-border); border-radius: 32px;
    padding: 48px 44px; width: 420px;
    box-shadow: 0 24px 64px rgba(20,10,0,0.18);
  }
  .auth-logo { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 20px; margin-bottom: 32px; }
  .auth-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -1px; margin-bottom: 6px; }
  .auth-sub { font-size: 14px; color: var(--text2); margin-bottom: 32px; }
  .social-btns { display: flex; gap: 12px; margin-bottom: 24px; }
  .social-btn {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;
    background: var(--surface); border: 1.5px solid var(--glass-border);
    border-radius: 14px; padding: 14px; cursor: pointer; font-size: 14px;
    font-family: 'Inter', sans-serif; font-weight: 500; color: var(--text);
    transition: border-color 0.18s, box-shadow 0.18s; position: relative;
  }
  .social-btn:hover { border-color: var(--orange); box-shadow: 0 4px 16px var(--orange-glow); }
  .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
  .divider-line { flex: 1; height: 1px; background: var(--glass-border); }
  .divider-txt { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .field { margin-bottom: 16px; }
  .field label { font-size: 12px; font-weight: 600; color: var(--text2); letter-spacing: 0.5px; text-transform: uppercase; display: block; margin-bottom: 8px; }
  .field input {
    width: 100%; background: var(--surface); border: 1.5px solid var(--glass-border);
    border-radius: 14px; padding: 14px 18px; font-size: 15px; color: var(--text);
    font-family: 'Inter', sans-serif; outline: none; transition: border-color 0.18s;
  }
  .field input:focus { border-color: var(--orange); }
  .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text3); }
  .auth-footer a { color: var(--orange); font-weight: 600; cursor: pointer; text-decoration: none; }

  /* ---- ONBOARDING ---- */
  .onboarding {
    height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .ob-card {
    background: var(--surface); border-radius: 32px;
    padding: 52px 48px; width: 560px;
    box-shadow: var(--shadow-modal);
  }
  .ob-progress { display: flex; gap: 8px; margin-bottom: 40px; }
  .ob-step { flex: 1; height: 4px; border-radius: 999px; background: var(--bg2); overflow: hidden; }
  .ob-step-fill { height: 100%; border-radius: 999px; background: var(--orange); transition: width 0.4s ease; }
  .ob-step-num { font-size: 12px; color: var(--text3); font-weight: 600; margin-bottom: 8px; letter-spacing: 1px; text-transform: uppercase; }
  .ob-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -1px; margin-bottom: 8px; }
  .ob-sub { font-size: 15px; color: var(--text2); margin-bottom: 32px; line-height: 1.5; }
  .chip-grid { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 36px; }
  .chip {
    padding: 10px 18px; border-radius: 999px; border: 1.5px solid var(--glass-border);
    font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.18s;
    background: transparent; color: var(--text);
  }
  .chip.selected { background: var(--orange); border-color: var(--orange); color: #fff; box-shadow: 0 4px 14px var(--orange-glow); }
  .creator-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 14px; margin-bottom: 36px; }
  .creator-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
  .creator-avatar {
    width: 56px; height: 56px; border-radius: 50%; overflow: hidden;
    border: 3px solid transparent; transition: border-color 0.18s, transform 0.18s;
  }
  .creator-item.selected .creator-avatar { border-color: var(--orange); transform: scale(1.06); }
  .creator-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .creator-name { font-size: 11px; color: var(--text2); font-weight: 500; text-align: center; }
  .goal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 36px; }
  .goal-card {
    border: 1.5px solid var(--glass-border); border-radius: 18px; padding: 20px;
    cursor: pointer; transition: all 0.18s;
  }
  .goal-card.selected { border-color: var(--orange); background: var(--orange-soft); }
  .goal-icon { font-size: 24px; margin-bottom: 8px; }
  .goal-label { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 14px; }
  .goal-desc { font-size: 12px; color: var(--text3); margin-top: 4px; }

  /* ---- APP SHELL ---- */
  .app-shell { height: 100vh; display: flex; overflow: hidden; position: relative; }

  /* ---- EXPANDED SIDEBAR ---- */
  .sidebar {
    width: 240px; flex-shrink: 0; background: var(--surface);
    border-right: 1px solid var(--glass-border);
    display: flex; flex-direction: column; padding: 28px 16px;
    gap: 4px; overflow-y: auto;
    transition: width 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.22s ease, transform 0.32s cubic-bezier(0.4,0,0.2,1);
  }
  .sidebar.collapsed { width: 0; opacity: 0; pointer-events: none; transform: translateX(-16px); }
  .dark .sidebar { background: rgb(18,16,24); }
  .dark .sidebar-user:hover { background: rgba(255,255,255,0.05); }

  /* Collapse toggle — stitched tab on right edge of sidebar */
  .sidebar-collapse-btn {
    position: absolute; top: 50%; transform: translateY(-50%);
    left: 240px; z-index: 50;
    width: 20px; height: 52px; border-radius: 0 10px 10px 0;
    background: var(--surface); border: 1.5px solid var(--glass-border);
    border-left: none;
    color: var(--text3); font-size: 13px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 3px 0 12px rgba(0,0,0,0.08);
    transition: background 0.18s, color 0.18s, left 0.32s cubic-bezier(0.4,0,0.2,1), width 0.18s;
  }
  .dark .sidebar-collapse-btn { background: rgb(18,16,24); border-color: rgba(255,255,255,0.10); }
  .sidebar-collapse-btn:hover { background: var(--orange-soft); color: var(--orange); width: 24px; }

  /* ---- FLOATING GLASS DOCK (collapsed state) ---- */
  .floating-dock {
    position: fixed; left: 16px; top: 50%; transform: translateY(-50%);
    z-index: 60; display: flex; flex-direction: column; align-items: center;
    gap: 6px; padding: 14px 10px;
    background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--glass-border); border-radius: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    animation: dockIn 0.32s var(--transition);
  }
  .dark .floating-dock { background: rgba(18,16,24,0.88); }
  @keyframes dockIn { from { opacity:0; transform: translateY(-50%) scale(0.88); } to { opacity:1; transform: translateY(-50%) scale(1); } }
  .dock-logo {
    font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 14px;
    color: var(--orange); letter-spacing: -0.5px; margin-bottom: 6px; line-height: 1;
  }
  .dock-divider { width: 24px; height: 1px; background: var(--glass-border); margin: 4px 0; }
  .dock-btn {
    width: 40px; height: 40px; border-radius: 14px; border: none;
    background: transparent; color: var(--text3); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; position: relative;
  }
  .dock-btn:hover { background: var(--orange-soft); color: var(--orange); }
  .dock-btn.active { background: var(--orange-soft); color: var(--orange); }
  .dock-btn-tooltip {
    position: absolute; left: 52px; top: 50%; transform: translateY(-50%);
    background: var(--text); color: var(--bg); font-size: 12px; font-weight: 600;
    padding: 5px 10px; border-radius: 8px; white-space: nowrap;
    pointer-events: none; opacity: 0; transition: opacity 0.15s;
    font-family: 'Montserrat', sans-serif;
  }
  .dock-btn:hover .dock-btn-tooltip { opacity: 1; }
  .dock-avatar {
    width: 38px; height: 38px; border-radius: 50%; overflow: hidden;
    border: 2px solid var(--orange); cursor: pointer; margin-top: 4px;
    transition: transform 0.18s; flex-shrink: 0;
  }
  .dock-avatar:hover { transform: scale(1.08); }
  .dock-avatar img { width: 100%; height: 100%; object-fit: cover; }

  .sidebar-logo { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 20px; padding: 8px 12px 24px; }
  .sidebar-logo span { color: var(--orange); }
  .nav-item {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    border-radius: 14px; cursor: pointer; font-size: 14px; font-weight: 500;
    color: var(--text2); transition: all 0.18s; border: none; background: transparent; width: 100%; text-align: left;
  }
  .nav-item:hover { background: var(--orange-soft); color: var(--orange); }
  .nav-item.active { background: var(--orange-soft); color: var(--orange); font-weight: 600; }
  .nav-icon { font-size: 18px; width: 22px; text-align: center; }
  .sidebar-spacer { flex: 1; }
  .sidebar-user {
    display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 14px;
    cursor: pointer; transition: background 0.18s;
  }
  .sidebar-user:hover { background: var(--bg2); }
  .user-avatar { width: 38px; height: 38px; border-radius: 50%; overflow: hidden; border: 2px solid var(--orange); }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-handle { font-size: 11px; color: var(--text3); }

  /* ---- DARK MODE ---- */
  .dark .search-bar { background: rgb(24,22,30); }
  .dark .filter-chip { color: var(--text3); border-color: rgba(255,255,255,0.10); }
  .dark .auth-card { background: rgba(24,22,30,0.95); border-color: rgba(255,255,255,0.10); }
  .dark .field input { background: rgb(30,28,38); border-color: rgba(255,255,255,0.10); color: var(--text); }
  .dark .social-btn { background: rgb(30,28,38); border-color: rgba(255,255,255,0.10); }
  .dark .ob-card { background: rgb(20,18,26); }
  .dark .goal-card { border-color: rgba(255,255,255,0.10); }
  .dark .goal-card.selected { background: var(--orange-soft); border-color: var(--orange); }
  .dark .settings-main, .dark .settings-sidebar { background: var(--bg); }

  /* ---- FOLLOWERS MODAL ---- */
  .followers-modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(6,5,4,0.65); backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.2s ease;
  }
  .followers-modal {
    background: var(--bg); border-radius: 24px; width: 420px; max-height: 80vh;
    display: flex; flex-direction: column; overflow: hidden;
    border: 1px solid var(--glass-border); box-shadow: var(--shadow-modal);
    animation: modalIn 0.3s var(--transition);
  }
  .dark .followers-modal { background: rgb(18,16,24); }
  .followers-modal-header {
    padding: 20px 24px 0; display: flex; align-items: center; gap: 0;
    border-bottom: 1px solid var(--glass-border);
  }
  .followers-tab {
    flex: 1; padding: 14px 0; text-align: center; font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 700; color: var(--text3); cursor: pointer;
    border-bottom: 2.5px solid transparent; transition: all 0.18s; margin-bottom: -1px;
  }
  .followers-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
  .followers-close {
    width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--glass-border);
    background: transparent; color: var(--text3); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-bottom: 8px;
    transition: all 0.18s;
  }
  .followers-close:hover { border-color: var(--orange); color: var(--orange); }
  .followers-list { overflow-y: auto; padding: 12px 0; }
  .follower-row {
    display: flex; align-items: center; gap: 14px; padding: 12px 24px;
    transition: background 0.15s; cursor: pointer;
  }
  .follower-row:hover { background: var(--bg2); }
  .follower-avatar { width: 46px; height: 46px; border-radius: 50%; overflow: hidden; flex-shrink: 0; border: 2px solid var(--glass-border); }
  .follower-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .follower-info { flex: 1; min-width: 0; }
  .follower-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .follower-handle { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .follower-recipes { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .follower-follow-btn {
    padding: 7px 16px; border-radius: 999px; border: 1.5px solid var(--orange);
    background: transparent; color: var(--orange); font-size: 12px; font-weight: 700;
    cursor: pointer; font-family: 'Montserrat', sans-serif; transition: all 0.18s; flex-shrink: 0;
  }
  .follower-follow-btn:hover { background: var(--orange); color: #fff; }
  .follower-follow-btn.following { background: var(--orange); color: #fff; }

  /* ---- NOTIFICATIONS DRAWER (LEFT) ---- */
  .notif-drawer {
    position: fixed; top: 0; left: 0; bottom: 0; z-index: 400;
    width: 380px; background: var(--bg);
    border-right: 1px solid var(--glass-border);
    box-shadow: 8px 0 40px rgba(0,0,0,0.18);
    display: flex; flex-direction: column;
    animation: drawerInLeft 0.3s var(--transition);
  }
  .dark .notif-drawer { background: rgb(15,13,21); }
  @keyframes drawerInLeft { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .notif-drawer-overlay {
    position: fixed; inset: 0; z-index: 399;
    background: rgba(0,0,0,0.3); backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
  }
  .notif-header {
    padding: 24px 24px 16px; border-bottom: 1px solid var(--glass-border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .notif-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 20px; color: var(--text); }
  .notif-mark-read { font-size: 12px; font-weight: 600; color: var(--orange); background: none; border: none; cursor: pointer; padding: 6px 12px; border-radius: 8px; transition: background 0.15s; }
  .notif-mark-read:hover { background: var(--orange-soft); }
  .notif-tabs { display: flex; padding: 0 24px; border-bottom: 1px solid var(--glass-border); gap: 0; }
  .notif-tab { padding: 12px 16px; font-size: 13px; font-weight: 600; color: var(--text3); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.18s; font-family: 'Montserrat', sans-serif; }
  .notif-tab.active { color: var(--orange); border-bottom-color: var(--orange); }
  .notif-list { flex: 1; overflow-y: auto; padding: 8px 0; }
  .notif-item {
    display: flex; gap: 14px; padding: 14px 24px; cursor: pointer;
    transition: background 0.15s; position: relative;
  }
  .notif-item:hover { background: var(--bg2); }
  .notif-item.unread::before { content: ''; position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 6px; height: 6px; border-radius: 50%; background: var(--orange); }
  .notif-avatar-wrap { position: relative; flex-shrink: 0; }
  .notif-avatar { width: 44px; height: 44px; border-radius: 50%; overflow: hidden; border: 2px solid var(--glass-border); }
  .notif-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .notif-type-badge { position: absolute; bottom: -2px; right: -2px; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; border: 2px solid var(--bg); }
  .notif-body { flex: 1; min-width: 0; }
  .notif-text { font-size: 13px; color: var(--text); line-height: 1.5; }
  .notif-text strong { font-weight: 700; }
  .notif-time { font-size: 11px; color: var(--text3); margin-top: 4px; }
  .notif-thumb { width: 44px; height: 44px; border-radius: 10px; overflow: hidden; flex-shrink: 0; }
  .notif-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .notif-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 60px 24px; color: var(--text3); text-align: center; }
  .notif-empty-icon { font-size: 40px; opacity: 0.5; }

  /* ---- EXPLORE PAGE ---- */
  .explore-header-hero {
    background: linear-gradient(135deg, var(--orange) 0%, #FF8C42 50%, #FFB347 100%);
    padding: 40px 36px 36px; position: relative; overflow: hidden;
  }
  .dark .explore-header-hero { background: linear-gradient(135deg, oklch(28% 0.08 40) 0%, oklch(22% 0.06 40) 100%); }
  .explore-hero-title { font-family: 'Montserrat', sans-serif; font-weight: 900; font-size: 32px; color: #fff; letter-spacing: -1px; margin-bottom: 6px; }
  .explore-hero-sub { font-size: 15px; color: rgba(255,255,255,0.82); margin-bottom: 24px; }
  .explore-search-bar {
    display: flex; align-items: center; gap: 12px;
    background: rgba(255,255,255,0.18); backdrop-filter: blur(12px);
    border: 1.5px solid rgba(255,255,255,0.35); border-radius: 16px;
    padding: 14px 20px; max-width: 480px; transition: background 0.18s;
  }
  .explore-search-bar:focus-within { background: rgba(255,255,255,0.28); }
  .explore-search-bar input { flex: 1; background: transparent; border: none; outline: none; font-size: 15px; color: #fff; font-family: 'Inter', sans-serif; }
  .explore-search-bar input::placeholder { color: rgba(255,255,255,0.65); }
  .explore-body { padding: 32px 36px 80px; }
  .explore-section { margin-bottom: 40px; }
  .explore-section-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .explore-section-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 20px; color: var(--text); letter-spacing: -0.5px; }
  .explore-see-all { font-size: 13px; font-weight: 600; color: var(--orange); background: none; border: none; cursor: pointer; padding: 6px 12px; border-radius: 8px; transition: background 0.15s; font-family: 'Montserrat', sans-serif; }
  .explore-see-all:hover { background: var(--orange-soft); }
  /* Trending scroll row */
  .trending-row { display: flex; gap: 16px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
  .trending-row::-webkit-scrollbar { display: none; }
  .trending-card {
    flex-shrink: 0; width: 200px; border-radius: 20px; overflow: hidden; cursor: pointer;
    position: relative; height: 260px;
    box-shadow: var(--shadow-card); transition: transform 0.25s var(--transition);
  }
  .trending-card:hover { transform: translateY(-6px) scale(1.02); }
  .trending-card img { width: 100%; height: 100%; object-fit: cover; }
  .trending-card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.78) 0%, transparent 55%); }
  .trending-card-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 14px; }
  .trending-rank { position: absolute; top: 12px; left: 12px; width: 28px; height: 28px; border-radius: 50%; background: var(--orange); color: #fff; font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 13px; display: flex; align-items: center; justify-content: center; }
  .trending-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 13px; color: #fff; line-height: 1.3; margin-bottom: 6px; }
  .trending-meta { font-size: 11px; color: rgba(255,255,255,0.75); }
  /* Creators row */
  .creators-row { display: flex; gap: 14px; overflow-x: auto; padding-bottom: 8px; scrollbar-width: none; }
  .creators-row::-webkit-scrollbar { display: none; }
  .creator-card {
    flex-shrink: 0; width: 150px; background: var(--surface); border-radius: 20px;
    padding: 20px 14px; text-align: center; cursor: pointer;
    border: 1px solid var(--glass-border); box-shadow: var(--shadow-card);
    transition: transform 0.22s var(--transition), box-shadow 0.22s;
  }
  .dark .creator-card { background: rgb(22,20,28); }
  .creator-card:hover { transform: translateY(-5px); box-shadow: 0 12px 36px rgba(20,10,0,0.18); }
  .creator-card-avatar { width: 64px; height: 64px; border-radius: 50%; overflow: hidden; margin: 0 auto 12px; border: 3px solid var(--orange); }
  .creator-card-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .creator-card-name { font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 13px; color: var(--text); margin-bottom: 3px; }
  .creator-card-recipes { font-size: 11px; color: var(--text3); margin-bottom: 12px; }
  .creator-follow-btn { width: 100%; padding: 7px; border-radius: 10px; border: 1.5px solid var(--orange); background: transparent; color: var(--orange); font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'Montserrat', sans-serif; transition: all 0.18s; }
  .creator-follow-btn:hover, .creator-follow-btn.following { background: var(--orange); color: #fff; }
  /* Collections grid */
  .collections-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
  .collection-card {
    border-radius: 20px; overflow: hidden; position: relative; cursor: pointer;
    height: 140px; box-shadow: var(--shadow-card);
    transition: transform 0.22s var(--transition);
  }
  .collection-card:first-child { grid-column: span 2; height: 200px; }
  .collection-card:hover { transform: scale(1.02); }
  .collection-card img { width: 100%; height: 100%; object-fit: cover; }
  .collection-card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.1) 60%, transparent 100%); }
  .collection-card-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px; }
  .collection-card-title { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 16px; color: #fff; margin-bottom: 4px; }
  .collection-card-count { font-size: 12px; color: rgba(255,255,255,0.75); }

  /* ---- SEARCH RESULTS PAGE ---- */
  .search-page { height: 100%; display: flex; flex-direction: column; overflow: hidden; }
  .search-page-header { padding: 20px 32px; border-bottom: 1px solid var(--glass-border); background: var(--bg); display: flex; align-items: center; gap: 14px; flex-shrink: 0; }
  .search-back-btn { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--glass-border); background: transparent; color: var(--text2); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.18s; flex-shrink: 0; }
  .search-back-btn:hover { border-color: var(--orange); color: var(--orange); }
  .search-page-bar { flex: 1; display: flex; align-items: center; gap: 12px; background: var(--bg2); border: 1.5px solid var(--glass-border); border-radius: 14px; padding: 12px 18px; transition: border-color 0.18s; }
  .dark .search-page-bar { background: oklch(16% 0.013 240); }
  .search-page-bar:focus-within { border-color: var(--orange); }
  .search-page-bar input { flex: 1; background: transparent; border: none; outline: none; font-size: 15px; color: var(--text); font-family: 'Inter', sans-serif; }
  .search-filters-row { display: flex; gap: 10px; padding: 16px 32px; border-bottom: 1px solid var(--glass-border); overflow-x: auto; scrollbar-width: none; flex-shrink: 0; align-items: center; }
  .search-filters-row::-webkit-scrollbar { display: none; }
  .search-sort-btn { display: flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 10px; border: 1.5px solid var(--glass-border); background: transparent; color: var(--text2); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Montserrat', sans-serif; white-space: nowrap; transition: all 0.18s; }
  .search-sort-btn.active { background: var(--orange-soft); border-color: var(--orange); color: var(--orange); }
  .search-divider { width: 1px; height: 24px; background: var(--glass-border); flex-shrink: 0; margin: 0 4px; }
  .search-results-grid { flex: 1; overflow-y: auto; padding: 24px 32px; columns: 4; column-gap: 16px; }
  .search-result-count { font-size: 13px; color: var(--text3); padding: 0 32px 16px; flex-shrink: 0; }

  /* ---- MAIN CONTENT ---- */
  .main-content { flex: 1; overflow-y: auto; background: var(--bg); min-width: 0; }

  /* ---- TOP APP BAR (mobile + desktop header) ---- */
  .top-app-bar {
    display: none; align-items: center; justify-content: space-between;
    padding: 14px 20px; background: var(--surface);
    border-bottom: 1px solid var(--glass-border);
    position: sticky; top: 0; z-index: 30;
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
  }
  .dark .top-app-bar { background: rgba(18,16,24,0.92); }
  .top-bar-logo { font-family: 'Montserrat', sans-serif; font-weight: 800; font-size: 18px; }
  .top-bar-logo span { color: var(--orange); }
  .top-bar-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn {
    width: 38px; height: 38px; border-radius: 12px; border: 1.5px solid var(--glass-border);
    background: transparent; color: var(--text2); font-size: 18px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; position: relative;
  }
  .icon-btn:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-soft); }
  .icon-btn .badge {
    position: absolute; top: -4px; right: -4px; width: 16px; height: 16px;
    border-radius: 50%; background: var(--orange); color: #fff;
    font-size: 9px; font-weight: 800; display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--bg); font-family: 'Montserrat', sans-serif;
  }

  /* ---- BOTTOM NAV (mobile) ---- */
  .bottom-nav {
    display: none; position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
    background: var(--surface); border-top: 1px solid var(--glass-border);
    padding: 8px 0 max(8px, env(safe-area-inset-bottom));
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  }
  .dark .bottom-nav { background: rgba(18,16,24,0.96); }
  .bottom-nav-inner { display: flex; justify-content: space-around; align-items: center; }
  .bottom-nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 6px 14px; cursor: pointer; border: none; background: transparent; min-width: 52px; }
  .bottom-nav-icon { font-size: 22px; transition: transform 0.2s var(--transition); }
  .bottom-nav-item.active .bottom-nav-icon { transform: scale(1.15); }
  .bottom-nav-label { font-size: 10px; font-weight: 600; color: var(--text3); font-family: 'Montserrat', sans-serif; }
  .bottom-nav-item.active .bottom-nav-label { color: var(--orange); }
  .bottom-nav-plus {
    width: 48px; height: 48px; border-radius: 16px;
    background: linear-gradient(135deg, var(--orange), var(--orange-light));
    border: none; color: #fff; font-size: 24px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 16px var(--orange-glow); transition: transform 0.18s;
  }
  .bottom-nav-plus:hover { transform: scale(1.08); }

  /* ---- NOTIFICATION BELL in sidebar header ---- */
  .sidebar-header-row { display: flex; align-items: center; justify-content: space-between; padding: 0 4px 20px; }
  .sidebar-bell {
    width: 34px; height: 34px; border-radius: 10px; border: 1.5px solid var(--glass-border);
    background: transparent; color: var(--text2); font-size: 16px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.18s; position: relative;
  }
  .sidebar-bell:hover { border-color: var(--orange); color: var(--orange); background: var(--orange-soft); }
  .sidebar-bell .badge { position: absolute; top: -4px; right: -4px; width: 14px; height: 14px; border-radius: 50%; background: var(--orange); color: #fff; font-size: 8px; font-weight: 800; display: flex; align-items: center; justify-content: center; border: 2px solid var(--bg); }

  /* ---- RESPONSIVE ---- */
  @media (max-width: 900px) {
    .app-shell { flex-direction: column; }
    .sidebar { display: none !important; }
    .floating-dock { display: none !important; }
    .sidebar-collapse-btn { display: none !important; }
    .top-app-bar { display: flex; }
    .bottom-nav { display: block; }
    .main-content { margin-left: 0 !important; padding-bottom: 80px; }
    .feed-grid { columns: 2 !important; padding: 16px; }
    .feed-header { padding: 12px 16px; flex-wrap: wrap; gap: 10px; }
    .search-bar { min-width: 0; }
    .filter-chips-wrap { width: 100%; }
    .modal { flex-direction: column; width: 95vw; max-height: 92vh; }
    .modal-img-side { width: 100%; height: 220px; flex-shrink: 0; }
    .modal-content-side { padding: 20px; }
    .vr-two-col { grid-template-columns: 1fr; }
    .vr-body { padding: 20px 16px 100px; }
    .vr-stats-row { gap: 8px; }
    .vr-stat { padding: 12px 8px; }
    .vr-stat-val { font-size: 15px; }
    .notif-drawer { width: 100vw; }
    .create-modal { width: 95vw; max-height: 94vh; }
    .ob-card { width: 95vw; padding: 32px 24px; }
    .explore-body { padding: 20px 16px 100px; }
    .collections-grid { grid-template-columns: 1fr 1fr; }
    .collection-card:first-child { grid-column: span 2; }
    .search-results-grid { columns: 2 !important; padding: 16px; }
    .followers-modal { width: 95vw; }
    .profile-stats { gap: 16px; }
    .profile-name { font-size: 20px; }
    .vr-title { font-size: 24px; }
    .hero-h1 { font-size: 28px; }
    .auth-card { width: 95vw; padding: 32px 24px; }
    .settings-layout { flex-direction: column; }
    .settings-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--glass-border); padding: 16px; display: flex; gap: 8px; overflow-x: auto; }
    .tweaks-panel { width: calc(100vw - 32px); bottom: 88px; }
  }
  @media (max-width: 480px) {
    .feed-grid { columns: 1 !important; }
    .search-results-grid { columns: 1 !important; }
    .nutri-grid { grid-template-columns: 1fr; }
    .vr-stats-row { display: grid; grid-template-columns: repeat(3,1fr); }
    .collections-grid { grid-template-columns: 1fr; }
    .collection-card:first-child { grid-column: span 1; }
    .create-two-col { grid-template-columns: 1fr; }
    .nutri-input-grid { grid-template-columns: 1fr; }
  }

  /* ---- DARK MODE POLISH ---- */
  .dark .recipe-card { background: rgb(22,20,28); border-color: rgba(255,255,255,0.06); }
  .dark .floating-dock { background: rgba(15,13,21,0.94); border-color: rgba(255,255,255,0.10); }
  .dark .create-modal { border-color: rgba(255,255,255,0.08); }
  .dark .modal-overlay { background: rgba(0,0,0,0.82); }
  .dark .followers-modal-overlay { background: rgba(0,0,0,0.78); }
  .dark .profile-info { background: rgb(18,16,24); }
  .dark .profile-tabs { background: rgb(18,16,24); }
  .dark .ob-card { border: 1px solid rgba(255,255,255,0.08); }
  .dark .vr-hero-btn { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
  .dark .bottom-nav { border-color: rgba(255,255,255,0.08); }
  .dark .top-app-bar { border-color: rgba(255,255,255,0.08); }
  .dark .icon-btn { border-color: rgba(255,255,255,0.10); }
  .dark .explore-section-title { color: var(--text); }
  .dark .notif-item:hover { background: oklch(18% 0.014 240); }
  .dark .trending-card { box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
  .dark .search-page-header { background: rgb(15,13,21); border-color: rgba(255,255,255,0.08); }
  .dark .search-filters-row { border-color: rgba(255,255,255,0.08); }
  .dark .btn-secondary { border-color: rgba(255,255,255,0.14); color: var(--text2); }

  /* ---- FEED ---- */
  .feed-header {
    position: sticky; top: 0; z-index: 20;
    background: color-mix(in oklch, var(--bg) 90%, transparent);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--glass-border);
    padding: 20px 32px; display: flex; align-items: center; gap: 16px;
  }
  .search-bar {
    flex: 1; display: flex; align-items: center; gap: 12px;
    background: var(--surface); border: 1.5px solid var(--glass-border);
    border-radius: 14px; padding: 12px 18px; transition: border-color 0.18s;
  }
  .search-bar:focus-within { border-color: var(--orange); }
  .search-bar input {
    flex: 1; border: none; background: transparent; outline: none;
    font-size: 14px; color: var(--text); font-family: 'Inter', sans-serif;
  }
  .search-icon { color: var(--text3); font-size: 16px; }
  .filter-chips {
    display: flex; gap: 8px; overflow-x: auto; cursor: grab; user-select: none;
    -webkit-overflow-scrolling: touch; padding-bottom: 2px;
    scrollbar-width: none;
  }
  .filter-chips::-webkit-scrollbar { display: none; }
  .filter-chips.dragging { cursor: grabbing; }
  .filter-chip {
    padding: 8px 16px; border-radius: 999px; border: 1.5px solid var(--glass-border);
    font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap;
    background: transparent; color: var(--text2); transition: all 0.18s; flex-shrink: 0;
  }
  .filter-chip.active { background: var(--orange); border-color: var(--orange); color: #fff; }
  .filter-chips-wrap { position: relative; flex: 1; min-width: 0; }
  .filter-fade-right {
    position: absolute; right: 0; top: 0; bottom: 0; width: 40px;
    background: linear-gradient(to right, transparent, color-mix(in oklch, var(--bg) 90%, transparent));
    pointer-events: none;
  }
  .feed-grid {
    padding: 28px 32px;
    columns: 4; column-gap: 16px;
  }
  /* ---- FEED CARDS (image-first) ---- */
  .recipe-card {
    break-inside: avoid; margin-bottom: 16px;
    border-radius: var(--radius-card); overflow: hidden; cursor: pointer;
    box-shadow: var(--shadow-card);
    transition: transform 0.28s var(--transition), box-shadow 0.28s;
    border: 1px solid var(--glass-border);
    position: relative; background: #111;
  }
  .recipe-card:hover { transform: translateY(-7px) scale(1.015); box-shadow: 0 20px 56px rgba(20,10,0,0.2); }
  .recipe-img { width: 100%; display: block; transition: transform 0.4s ease; }
  .recipe-card:hover .recipe-img { transform: scale(1.04); }

  /* heart btn — top right, revealed on hover */
  .card-heart-btn {
    position: absolute; top: 12px; right: 12px; z-index: 4;
    width: 38px; height: 38px; border-radius: 50%;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.18);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; opacity: 0; transform: scale(0.8) translateY(-4px);
    transition: opacity 0.22s ease, transform 0.22s var(--transition);
    font-size: 16px; color: #fff;
  }
  .recipe-card:hover .card-heart-btn { opacity: 1; transform: scale(1) translateY(0); }
  .card-heart-btn.liked { background: rgba(255,107,53,0.85); opacity: 1; }
  .card-like-count {
    position: absolute; top: 12px; right: 56px; z-index: 4;
    background: rgba(0,0,0,0.45); backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.18);
    border-radius: 999px; padding: 6px 12px;
    font-size: 12px; font-weight: 700; color: #fff;
    opacity: 0; transform: scale(0.85) translateY(-4px);
    transition: opacity 0.22s ease 0.04s, transform 0.22s var(--transition) 0.04s;
  }
  .recipe-card:hover .card-like-count { opacity: 1; transform: scale(1) translateY(0); }

  /* bottom overlay */
  .card-overlay {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 48px 16px 16px;
    background: linear-gradient(to top, rgba(0,0,0,0.82) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
    pointer-events: none;
  }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
  .card-tag {
    padding: 3px 10px; border-radius: 999px;
    background: rgba(255,107,53,0.75); backdrop-filter: blur(4px);
    color: #fff; font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .card-title {
    font-family: 'Montserrat', sans-serif; font-weight: 800;
    font-size: 14px; line-height: 1.3; color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5); margin-bottom: 10px;
  }
  .card-author-row { display: flex; align-items: center; gap: 8px; pointer-events: auto; }
  .card-author-avatar { width: 26px; height: 26px; border-radius: 50%; overflow: hidden; border: 1.5px solid rgba(255,255,255,0.5); flex-shrink: 0; }
  .card-author-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .card-author-name { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.9); }
  .card-time { margin-left: auto; font-size: 11px; color: rgba(255,255,255,0.65); font-weight: 500; }

  /* ---- MODAL ---- */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(6,5,4,0.75); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    padding: 32px;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: var(--bg); border: 1px solid var(--glass-border);
    border-radius: 32px;

        </div>
      </div>
    </div>
  );
}

// ---- FEED HEADER (draggable chips) ----
function FeedHeader({ activeFilter, setActiveFilter, filters, onSearch }) {
  const chipsRef = React.useRef(null);
  const drag = React.useRef({ active: false, startX: 0, scrollLeft: 0 });

  const onMouseDown = (e) => {
    drag.current = { active: true, startX: e.pageX - chipsRef.current.offsetLeft, scrollLeft: chipsRef.current.scrollLeft };
    chipsRef.current.classList.add('dragging');
  };
  const onMouseMove = (e) => {
    if (!drag.current.active) return;
    e.preventDefault();
    const x = e.pageX - chipsRef.current.offsetLeft;
    chipsRef.current.scrollLeft = drag.current.scrollLeft - (x - drag.current.startX);
  };
  const onMouseUp = () => { drag.current.active = false; chipsRef.current && chipsRef.current.classList.remove('dragging'); };

  return (
    <div className="feed-header">
      <div className="search-bar">
        <Ic n="search" size={16} style={{color:"var(--text3)",flexShrink:0}}/>
        <input placeholder="Search 2.4M recipes…" onKeyDown={e=>e.key==="Enter"&&onSearch&&onSearch(e.target.value)} onClick={()=>onSearch&&onSearch("")} readOnly={!onSearch} style={{cursor:onSearch?"text":"default"}} />
      </div>
      <div className="filter-chips-wrap">
        <div className="filter-chips" ref={chipsRef}
          onMouseDown={onMouseDown} onMouseMove={onMouseMove}
          onMouseUp={onMouseUp} onMouseLeave={onMouseUp}>
          {filters.map(f => (
            <button key={f} className={`filter-chip ${activeFilter===f?'active':''}`}
              onClick={()=>setActiveFilter(f)}
              onMouseDown={e=>e.stopPropagation()}>{f}</button>
          ))}
        </div>
        <div className="filter-fade-right" />
      </div>
    </div>
  );
}

  const [followed, setFollowed] = useState(() => new Set(MOCK_FOLLOWERS.filter(f=>f.following).map(f=>f.id)));
  const list = tab === "Followers" ? MOCK_FOLLOWERS : MOCK_FOLLOWERS.slice(0,5);
  const toggle = (id) => setFollowed(s => { const n = new Set(s); n.has(id) ? n.delete(id) : n.add(id); return n; });
  return (
    <div className="followers-modal-overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="followers-modal">
        <div className="followers-modal-header">
          {["Followers","Following"].map(t => (
            <div key={t} className={`followers-tab ${tab===t?'active':''}`} onClick={()=>setTab(t)}>{t}</div>
          ))}
          <button className="followers-close" onClick={onClose}><Ic n="close" size={13}/></button>
        </div>
        <div className="followers-list">
          {list.map(u => (
            <div key={u.id} className="follower-row">
              <div className="follower-avatar"><img src={u.avatar} alt="" /></div>
              <div className="follower-info">
                <div className="follower-name">{u.name}</div>
                <div className="follower-handle">{u.handle}</div>
                <div className="follower-recipes">{u.recipes} recipes</div>
              </div>
              <button className={`follower-follow-btn ${followed.has(u.id)?'following':''}`} onClick={()=>toggle(u.id)}>
                {followed.has(u.id) ? "Following" : "Follow"}
              </button>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ---- FEED PAGE ----
function FeedPage({ cols = 4, onSearch }) {
  const [selected, setSelected] = useState(null);
  const [viewing, setViewing] = useState(null);
  const [sharing, setSharing] = useState(null);
  const [likedCards, setLikedCards] = useState({});
  const [activeFilter, setActiveFilter] = useState("All");
  const filters = ["All","Vegan","High Protein","Keto","Breakfast","Quick & Easy","Plant-Based","Dessert","Smoothie"];
  const filtered = activeFilter === "All" ? RECIPES : RECIPES.filter(r => r.tag === activeFilter);

  const toggleLike = (e, id) => {
    e.stopPropagation();
    setLikedCards(prev => ({...prev, [id]: !prev[id]}));
  };

  if (viewing) return (
    <>
      <ViewRecipe recipe={viewing} onBack={()=>setViewing(null)} onShare={()=>setSharing(viewing)} />
      {sharing && <CreateRecipe onClose={()=>setSharing(null)} />}
    </>
  );

  return (
    <div style={{height:"100%",overflowY:"auto"}}>
      <FeedHeader activeFilter={activeFilter} setActiveFilter={setActiveFilter} filters={filters} onSearch={onSearch} />
      <div className="feed-grid" style={{columns:cols}}>
        {filtered.map(r => (
          <div key={r.id} className="recipe-card" onClick={()=>setSelected(r)}>
            <img className="recipe-img" src={r.img} alt={r.title} loading="lazy" />
            {/* heart + like count — revealed on hover */}
            <div className={`card-heart-btn ${likedCards[r.id]?'liked':''}`} onClick={e=>toggleLike(e,r.id)}>
              {likedCards[r.id] ? "❤️" : "🤍"}
            </div>
            <div className="card-like-count">
              {(r.likes + (likedCards[r.id]?1:0)).toLocaleString()}
            </div>
            {/* bottom overlay */}
            <div className="card-overlay">
              <div className="card-tags"><span className="card-tag">{r.tag}</span></div>
              <div className="card-title">{r.title}</div>
              <div className="card-author-row">
                <div className="card-author-avatar"><img src={r.avatar} alt="" /></div>
                <span className="card-author-name">{r.author}</span>
                <span className="card-time"><Ic n="clock" size={11} style={{opacity:0.7}}/> {r.time}</span>
              </div>
            </div>
            </div>
        ))}
      </div>
      {selected && <RecipeModal
        recipe={selected}
        onClose={()=>setSelected(null)}
        onViewRecipe={()=>{ setViewing(selected); setSelected(null); }}
        onShare={()=>{ setSharing(selected); }}
      />}
      {sharing && !viewing && <CreateRecipe onClose={()=>setSharing(null)} />}
    </div>
  );
}

          <div className="explore-hero-title">Explore Nutrisipe</div>
          <div className="explore-hero-sub">Discover trending recipes, top creators & curated collections</div>
          <div className="explore-search-bar">
            <Ic n="search" size={20} style={{opacity:0.8,color:"rgba(255,255,255,0.85)"}}/>
            <input placeholder="Search recipes, creators, cuisines…" value={searchVal} onChange={e=>setSearchVal(e.target.value)} onKeyDown={handleSearch} />
            {searchVal && <button onClick={()=>onSearch(searchVal)} style={{padding:"6px 14px",borderRadius:10,background:"rgba(255,255,255,0.25)",border:"1px solid rgba(255,255,255,0.4)",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'Montserrat',sans-serif"}}>Search</button>}
          </div>
        </div>
      </div>

      <div className="explore-body">
        {/* Trending */}
        <div className="explore-section">
          <div className="explore-section-head">
            <div className="explore-section-title"><Ic n="flame" size={20}/> Trending Now</div>
            <button className="explore-see-all">See all</button>
          </div>
          <div className="trending-row">
            {RECIPES.map((r,i)=>(
              <div key={r.id} className="trending-card">
                <img src={r.img} alt={r.title} />
                <div className="trending-card-overlay" />
                <div className="trending-rank">{i+1}</div>
                <div className="trending-card-body">
                  <div className="trending-title">{r.title}</div>
                  <div className="trending-meta">{r.likes.toLocaleString()} likes · {r.time}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* Featured Creators */}
        <div className="explore-section">
          <div className="explore-section-head">
            <div className="explore-section-title"><Ic n="star" size={20}/> Featured Creators</div>
            <button className="explore-see-all">See all</button>
          </div>
          <div className="creators-row">
            {FEATURED_CREATORS.map(c=>(
              <div key={c.id} className="creator-card">
                <div className="creator-card-avatar"><img src={c.avatar} alt="" /></div>
                <div className="creator-card-name">{c.name}</div>
                <div className="creator-card-recipes">{c.followers} followers · {c.recipes} recipes</div>
                <button className={`creator-follow-btn ${followed.has(c.id)?'following':''}`} onClick={()=>toggleFollow(c.id)}>
                  {followed.has(c.id)?"Following":"Follow"}
                </button>
              </div>
            ))}
          </div>
        </div>

        {/* Collections */}
        <div className="explore-section">
          <div className="explore-section-head">
            <div className="explore-section-title"><Ic n="map" size={20}/> Curated Collections</div>
            <button className="explore-see-all">Browse all</button>
          </div>
          <div className="collections-grid">
            {COLLECTIONS.map((c,i)=>(
              <div key={i} className="collection-card">
                <img src={c.img} alt={c.title} />
                <div className="collection-card-overlay" />
                <div className="collection-card-body">
                  <div className="collection-card-title">{c.title}</div>
                  <div className="collection-card-count">{c.count}</div>
                </div>
              </div>
            ))}
          </div>
        </div>

        {/* New this week */}
        <div className="explore-section">
          <div className="explore-section-head">
            <div className="explore-section-title"><Ic n="zap" size={20}/> New This Week</div>
          </div>
          <div style={{columns:3,columnGap:16}}>
            {RECIPES.slice(0,6).map(r=>(
              <div key={r.id} className="recipe-card" style={{marginBottom:16,breakInside:"avoid"}}>
                <img className="recipe-img" src={r.img} alt={r.title} loading="lazy" />
                <div className="card-overlay">
                  <div className="card-tags"><span className="card-tag">{r.tag}</span></div>
                  <div className="card-title">{r.title}</div>
                  <div className="card-author-row">
                    <div className="card-author-avatar"><img src={r.avatar} alt="" /></div>
                    <span className="card-author-name">{r.author}</span>
                    <span className="card-time">⏱ {r.time}</span>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ---- SEARCH RESULTS PAGE ----
function SearchPage({ query: initialQuery, onBack }) {
  const [query, setQuery] = useState(initialQuery);
  const [sort, setSort] = useState("Relevance");
  const [activeTag, setActiveTag] = useState("All");
  const sorts = ["Relevance","Most Liked","Quickest","Newest"];
  const tags = ["All","Vegan","High Protein","Keto","Breakfast","Quick & Easy","Plant-Based","Dessert"];
  const results = RECIPES.filter(r =>
    (activeTag==="All" || r.tag===activeTag) &&
    (query==="" || r.title.toLowerCase().includes(query.toLowerCase()) || r.tag.toLowerCase().includes(query.toLowerCase()) || r.author.toLowerCase().includes(query.toLowerCase()))
  );
  const [selected, setSelected] = useState(null);
  const [viewing, setViewing] = useState(null);

  if (viewing) return <ViewRecipe recipe={viewing} onBack={()=>setViewing(null)} onShare={()=>{}} />;

  return (
    <div className="search-page">
      <div className="search-page-header">
        <button className="search-back-btn" onClick={onBack}><Ic n="arrowLeft" size={18}/></button>
        <div className="search-page-bar">
          <Ic n="search" size={16} style={{color:"var(--text3)"}}/>
          <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Search recipes, creators…" autoFocus />
          {query && <button onClick={()=>setQuery("")} style={{background:"none",border:"none",color:"var(--text3)",cursor:"pointer",fontSize:16,padding:"0 4px"}}>×</button>}
        </div>
      </div>
      <div className="search-filters-row">
        <span style={{fontSize:12,color:"var(--text3)",fontWeight:600,flexShrink:0}}>Sort:</span>
        {sorts.map(s=><button key={s} className={`search-sort-btn ${sort===s?'active':''}`} onClick={()=>setSort(s)}>{s}</button>)}
        <div className="search-divider" />
        <span style={{fontSize:12,color:"var(--text3)",fontWeight:600,flexShrink:0}}>Filter:</span>
        {tags.map(t=><button key={t} className={`filter-chip ${activeTag===t?'active':''}`} onClick={()=>setActiveTag(t)}>{t}</button>)}
      </div>
      <div className="search-result-count">
        {results.length === 0 ? "No results" : `${results.length} recipe${results.length!==1?"s":""} found`}
        {query && <span style={{color:"var(--orange)",fontWeight:600}}> for "{query}"</span>}
      </div>
      <div className="search-results-grid">
        {results.map(r=>(
          <div key={r.id} className="recipe-card" style={{marginBottom:16,breakInside:"avoid"}} onClick={()=>setSelected(r)}>
            <img className="recipe-img" src={r.img} alt={r.title} loading="lazy" />
            <div className="card-overlay">
              <div className="card-tags"><span className="card-tag">{r.tag}</span></div>
              <div className="card-title">{r.title}</div>
              <div className="card-author-row">
                <div className="card-author-avatar"><img src={r.avatar} alt="" /></div>
                <span className="card-author-name">{r.author}</span>
                <span className="card-time">⏱ {r.time}</span>
              </div>
            </div>
          </div>
        ))}
        {results.length === 0 && (
          <div style={{textAlign:"center",padding:"60px 24px",color:"var(--text3)",gridColumn:"1/-1"}}>
            <div style={{fontSize:48,marginBottom:16}}>🍽️</div>
            <div style={{fontFamily:"'Montserrat',sans-serif",fontWeight:700,fontSize:16,color:"var(--text)",marginBottom:8}}>No recipes found</div>
            <div style={{fontSize:14}}>Try a different search or remove filters</div>
          </div>
        )}
      </div>
      {selected && <RecipeModal recipe={selected} onClose={()=>setSelected(null)} onViewRecipe={()=>{setViewing(selected);setSelected(null);}} onShare={()=>{}} />}
    </div>
  );
}

// ---- TWEAKS PANEL ----
function TweaksPanel({ tweaks, setTweaks }) {
  const accentColors = ["#FF6B35","#E63946","#2EC4B6","#8338EC","#3A86FF"];
  const radiusOpts = [{"label":"Soft","val":"24"},{"label":"Rounder","val":"32"},{"label":"Sharp","val":"14"}];
  const colOpts = [{"label":"3","val":"3"},{"label":"4","val":"4"},{"label":"5","val":"5"}];
  return (
    <div className="tweaks-panel">
      <div className="tweaks-title">⚙ Tweaks</div>
      <div className="tweak-row">
        <div className="tweak-label">Accent Color</div>
        <div className="tweak-options">
          {accentColors.map(c=>(
            <div key={c} className={`tweak-color ${tweaks.accentColor===c?'sel':''}`}
              style={{background:c}} onClick={()=>setTweaks(t=>({...t,accentColor:c}))} />
          ))}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">Card Radius</div>
        <div className="tweak-options">
          {radiusOpts.map(o=><button key={o.val} className={`tweak-opt ${tweaks.cardRadius===o.val?'sel':''}`} onClick={()=>setTweaks(t=>({...t,cardRadius:o.val}))}>{o.label}</button>)}
        </div>
      </div>
      <div className="tweak-row">
        <div className="tweak-label">Feed Columns</div>
        <div className="tweak-options">
          {colOpts.map(o=><button key={o.val} className={`tweak-opt ${tweaks.feedColumns===o.val?'sel':''}`} onClick={()=>setTweaks(t=>({...t,feedColumns:o.val}))}>{o.label}</button>)}
        </div>
      </div>
    </div>
  );
}

// ---- ROOT APP ----
function App() {
  const [screen, setScreen] = useState('landing');
  const [authMode, setAuthMode] = useState('signup');
  const [dark, setDark] = useState(false);
  const [appPage, setAppPage] = useState('feed');
  const [showTweaks, setShowTweaks] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  useEffect(() => {
    document.documentElement.classList.toggle('dark', dark || tweaks.darkMode);
  }, [dark, tweaks.darkMode]);

  useEffect(() => {
    const root = document.documentElement;
    root.style.setProperty('--orange', tweaks.accentColor);
    root.style.setProperty('--orange-light', tweaks.accentColor + "cc");
    root.style.setProperty('--orange-glow', tweaks.accentColor + "55");
    root.style.setProperty('--orange-soft', tweaks.accentColor + "20");
    root.style.setProperty('--radius-card', tweaks.cardRadius + "px");
  }, [tweaks]);

  // Tweaks message protocol
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  useEffect(() => {
    if (showTweaks) {
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweaks }, '*');
    }
  }, [tweaks, showTweaks]);

  const handleCTA = (dest) => {
    if (dest === 'login') { setAuthMode('login'); setScreen('auth'); }
    else if (dest === 'signup') { setAuthMode('signup'); setScreen('auth'); }
    else if (dest === 'feed') { setAppPage('feed'); setScreen('app'); }
    else setScreen(dest);
  };

  return (
    <div style={{height:"100vh",overflow:"hidden"}}>
      {screen === 'landing' && <LandingPage onCTA={handleCTA} />}
      {screen === 'auth' && <AuthPage mode={authMode} onAuth={(next) => { if(next==='onboarding') setScreen('onboarding'); else { setAppPage('feed'); setScreen('app'); }}} onSwitch={()=>setAuthMode(m=>m==='signup'?'login':'signup')} />}
      {screen === 'onboarding' && <Onboarding onComplete={()=>{ setAppPage('feed'); setScreen('app'); }} />}
      {screen === 'app' && <AppShell page={appPage} setPage={setAppPage} dark={dark} onDarkToggle={()=>setDark(d=>!d)} tweaks={tweaks} />}

      {/* Quick nav for prototype */}
      {screen !== 'app' && (
        <div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",display:"flex",gap:8,zIndex:999,background:"var(--surface)",borderRadius:999,padding:"8px 16px",boxShadow:"var(--shadow-modal)",border:"1px solid var(--glass-border)"}}>
          {[["🏠","landing"],["🔐","auth"],["🧙","onboarding"],["📱","app"]].map(([icon,s])=>(
            <button key={s} onClick={()=>{ if(s==="app"){setAppPage("feed");} setScreen(s); }} style={{background:screen===s?"var(--orange)":"transparent",color:screen===s?"#fff":"var(--text2)",border:"none",borderRadius:999,padding:"6px 14px",fontSize:13,cursor:"pointer",fontWeight:600,transition:"all 0.15s"}}>
              {icon} {s.charAt(0).toUpperCase()+s.slice(1)}
            </button>
          ))}
        </div>
      )}

      {showTweaks && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
